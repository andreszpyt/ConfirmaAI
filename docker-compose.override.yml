services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api_local
    ports:
      - "8082:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    environment:
      - SERVER_URL=http://localhost:8082
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=sua-chave-local
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:admin@postgres:5432/confirmaai?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - REDIS_ENABLED=false
    networks:
      - confirma-network

volumes:
  evolution_instances:
  evolution_store: