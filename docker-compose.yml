version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: confirma-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: confirmaai
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d confirmaai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - confirma-network

volumes:
  postgres_data:

networks:
  confirma-network:
    driver: bridge

