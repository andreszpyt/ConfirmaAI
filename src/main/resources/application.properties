# Garante a porta 8081
quarkus.http.port=8081

# Desliga QUALQUER tentativa de usar Docker automaticamente
quarkus.devservices.enabled=false
quarkus.langchain4j.devservices.open-webui.enabled=false

# Banco de Dados
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=admin
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5436/confirmaai
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

# ConfigurańŃo da IA
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.0